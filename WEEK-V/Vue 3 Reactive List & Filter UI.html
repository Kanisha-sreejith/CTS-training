<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Tracker</title>
    <script src="https://unpkg.com/vue@3"></script>
    <style>
      body { font-family: Arial, sans-serif; background: #f4f8fb; padding: 20px; }
      .box { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
      input { width: 100%; padding: 8px; margin-bottom: 10px; }
      ul { list-style: none; padding: 0; }
      li { padding: 8px 0; border-bottom: 1px solid #eee; }
    </style>
  </head>
  <body>
    <div id="app" class="box">
      <h2>Skill Tracker</h2>
      <input v-model="search" placeholder="Search a skill" />
      <ul>
        <li v-for="skill in filteredSkills" :key="skill">
          {{ skill }}
        </li>
      </ul>
    </div>

    <script>
      Vue.createApp({
        data() {
          return {
            search: '',
            skills: ['Python', 'React', 'SQL', 'Django', 'Docker']
          };
        },
        computed: {
          filteredSkills() {
            return this.skills.filter(skill =>
              skill.toLowerCase().includes(this.search.toLowerCase())
            );
          }
        }
      }).mount('#app');
    </script>
  </body>
</html>
